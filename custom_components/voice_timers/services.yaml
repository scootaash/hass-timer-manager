pause:
  name: Pause timer
  description: Pause an active voice timer.
  fields:
    entity_id:
      name: Timer entity
      description: The voice timer sensor entity to pause.
      required: false
      selector:
        entity:
          integration: voice_timers
          domain: sensor
    timer_id:
      name: Timer ID (advanced)
      description: Raw timer UUID — use entity_id instead unless calling from an automation with a dynamic ID.
      required: false
      selector:
        text:

unpause:
  name: Unpause timer
  description: Resume a paused voice timer.
  fields:
    entity_id:
      name: Timer entity
      description: The voice timer sensor entity to resume.
      required: false
      selector:
        entity:
          integration: voice_timers
          domain: sensor
    timer_id:
      name: Timer ID (advanced)
      description: Raw timer UUID — use entity_id instead unless calling from an automation with a dynamic ID.
      required: false
      selector:
        text:

cancel:
  name: Cancel timer
  description: Cancel a voice timer without firing the finished event.
  fields:
    entity_id:
      name: Timer entity
      description: The voice timer sensor entity to cancel.
      required: false
      selector:
        entity:
          integration: voice_timers
          domain: sensor
    timer_id:
      name: Timer ID (advanced)
      description: Raw timer UUID — use entity_id instead unless calling from an automation with a dynamic ID.
      required: false
      selector:
        text:

add_time:
  name: Add / remove time
  description: >
    Extend or shrink a running timer. Positive values add time; negative
    values subtract it (routed to TimerManager.remove_time internally).
  fields:
    entity_id:
      name: Timer entity
      description: The voice timer sensor entity to adjust.
      required: false
      selector:
        entity:
          integration: voice_timers
          domain: sensor
    timer_id:
      name: Timer ID (advanced)
      description: Raw timer UUID — use entity_id instead unless calling from an automation with a dynamic ID.
      required: false
      selector:
        text:
    seconds:
      name: Seconds
      description: Seconds to add (negative to subtract, range −3600…3600).
      required: true
      selector:
        number:
          min: -3600
          max: 3600
          unit_of_measurement: s
